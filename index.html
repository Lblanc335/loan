<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안심철거 - 상가·건물 철거</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-container">
            <div class="logo">
                <span class="logo-icon">안</span>
                <h1>안심철거</h1>
            </div>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="#service">서비스 안내</a></li>
                    <li><a href="#target">이용 대상</a></li>
                    <li><a href="#process">작업 프로세스</a></li>
                    <li><a href="#reviews">후기</a></li>
                    <li><a href="#faq">자주묻는질문</a></li>
                </ul>
            </nav>

            <div class="header-contact">
                <span class="phone-number">010-2232-7752</span>
                <a href="#quote" class="btn btn-primary">무료 견적 신청</a>
            </div>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="container hero-container">
                <div class="hero-content">
                    <span class="badge">안전제일 · 책임시공</span>
                    <h2>상가·건물 철거,<br>합법적이고 안전하게<br>처리하세요</h2>
                    <p>오랜 노하우와 전문 장비로 소음과 분진을 최소화하며,<br>폐기물 처리까지 원스톱으로 해결해 드립니다.</p>
                    
                    <div class="hero-stats">
                        <div class="stat-item"><strong>1,200+</strong><span>누적 철거</span></div>
                        <div class="stat-item"><strong>30년+</strong><span>경력 노하우</span></div>
                        <div class="stat-item"><strong>4.9점</strong><span>고객 만족도</span></div>
                    </div>

                    <div class="hero-actions">
                        <a href="#quote" class="btn btn-primary btn-large">무료 견적 신청</a>
                        <a href="#consult" class="btn btn-outline btn-large">카카오톡 상담</a>
                    </div>
                </div>
                
                <div class="hero-form-box">
                    <h3>빠른 견적 문의</h3>
                    <form action="/submit-quote" method="POST">
                        <input type="text" placeholder="이름 / 상호명" required>
                        <input type="tel" placeholder="연락처" required>
                        <select required>
                            <option value="">철거 종류 선택</option>
                            <option value="상가">상가 내부 철거</option>
                            <option value="건물">건물 완파</option>
                        </select>
                        <button type="submit" class="btn btn-primary btn-full">무료 견적 받기</button>
                    </form>
                </div>
            </div>
        </section>

        </main>

    <footer class="site-footer">
        </footer>

</body>
</html>
